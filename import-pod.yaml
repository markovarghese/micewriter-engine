apiVersion: v1
kind: Pod
metadata:
  name: import-pod
  namespace: default
spec:
  nodeName: k8s-node-1
  containers:
  - name: import
    image: docker:24-cli
    command: ["sleep", "3600"]
    volumeMounts:
    - name: containerd-sock
      mountPath: /run/k3s/containerd/containerd.sock
    securityContext:
      privileged: true
  volumes:
  - name: containerd-sock
    hostPath:
      path: /run/k3s/containerd/containerd.sock
      type: Socket
